name: Publish Packages

on:
    workflow_dispatch:
    push:
        tags:
            - 'v*.*.*' # Match version tags like v1.0.0

jobs:
    publish:
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.base_ref == 'refs/heads/core')
        
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '9.x'

            - name: Restore dependencies
              run: dotnet restore InfiniLore.InfiniBlazor.GitHubActions.slnf

            - name: Build
              run: dotnet build InfiniLore.InfiniBlazor.GitHubActions.slnf --configuration Release --no-restore
            
            # Ensure that the tests must pass 
            # The job will fail automatically if any test fails because `dotnet test` exits with a non-zero code
            - name: Run tests     
              run: dotnet test InfiniLore.InfiniBlazor.GitHubActions.slnf --configuration Release --no-restore --no-build

            - name: Publish to NuGet
              env:
                  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
              run: |
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Core.Components/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Core.Js/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Core.Markdown/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Core.Theming/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Core.Toasting/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Extensions.AutoDocumentation/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Extensions.AutoDocumentation.SourceGenerators/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Extensions.ExtraComponents/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Extensions.Maui/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Contracts/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.Shared/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
                  dotnet nuget push src/InfiniLore.InfiniBlazor.SourceGenerators/bin/Release/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate

            -   name: Extract version from tag
                id: version
                run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            -   name: Create GitHub Release
                uses: actions/create-release@v1
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                with:
                    tag_name: ${{ github.ref_name }}
                    release_name: Release ${{ github.ref_name }}
                    body: |
                        ## InfiniBlazor ${{ steps.version.outputs.version }}
                        
                        ### 📦 NuGet Packages Published
                        - InfiniLore.InfiniBlazor.Core.Components
                        - InfiniLore.InfiniBlazor.Core.Js
                        - InfiniLore.InfiniBlazor.Core.Markdown
                        - InfiniLore.InfiniBlazor.Core.Theming
                        - InfiniLore.InfiniBlazor.Core.Toasting
                        - InfiniLore.InfiniBlazor.Extensions.AutoDocumentation
                        - InfiniLore.InfiniBlazor.Extensions.AutoDocumentation.SourceGenerators
                        - InfiniLore.InfiniBlazor.Extensions.ExtraComponents
                        - InfiniLore.InfiniBlazor.Extensions.Maui
                        - InfiniLore.InfiniBlazor
                        - InfiniLore.InfiniBlazor.Contracts
                        - InfiniLore.InfiniBlazor.Shared
                        - InfiniLore.InfiniBlazor.SourceGenerators
                        
                        All packages are available on [NuGet](https://www.nuget.org/packages?q=InfiniLore.InfiniBlazor).
                    draft: false
                    prerelease: ${{ contains(github.ref_name, 'preview') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

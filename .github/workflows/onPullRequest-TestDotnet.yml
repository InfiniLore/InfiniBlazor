name: Dotnet Testing

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        branches: [ core ] 

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '9.x'
            
            - name: Dump .slnf file
              run: cat InfiniLore.InfiniBlazor.GitHubActions.slnf
            
            - name: List files
              run: ls -R                         
                         
            - name: Clean build folder
              run: dotnet clean InfiniLore.InfiniBlazor.GitHubActions.slnf

            - name: Restore dependencies
              run: dotnet restore InfiniLore.InfiniBlazor.GitHubActions.slnf 

            - name: Build
              run: dotnet build InfiniLore.InfiniBlazor.GitHubActions.slnf --configuration Release --no-restore
            
            - name: Run tests
              run: dotnet test InfiniLore.InfiniBlazor.GitHubActions.slnf --configuration Release --no-restore --no-build
name: Dotnet Testing

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        branches: [ core ] 

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '9.x'

            - name: Restore dependencies
              run: dotnet restore InfiniLore.InfiniBlazor.slnx \
                  --exclude Example.InfiniBlazor \
                  --exclude Example.InfiniBlazor.Client \
                  --exclude Example.InfiniBlazor.Maui \
                  --exclude Example.InfiniBlazor.Shared 

            - name: Build
              run: dotnet build InfiniLore.InfiniBlazor.slnx --configuration Release --no-restore\
                  --exclude Example.InfiniBlazor \
                  --exclude Example.InfiniBlazor.Client \
                  --exclude Example.InfiniBlazor.Maui \
                  --exclude Example.InfiniBlazor.Shared
            
            - name: Run tests
              run: dotnet test InfiniLore.InfiniBlazor.slnx --configuration Release --no-restore --no-build\
                  --exclude Example.InfiniBlazor \
                  --exclude Example.InfiniBlazor.Client \
                  --exclude Example.InfiniBlazor.Maui \
                  --exclude Example.InfiniBlazor.Shared 

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InfiniBlazor Docs</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="_content/InfiniLore.InfiniBlazor/InfiniBlazor.css" />

    <!--suppress CssUnresolvedCustomProperty -->
    <style>
        #loading-progress {
            stroke-width: 0.6rem;
            transform-origin: 50% 50%;
            transform: rotate(-90deg);
        }

        /* TODO This is not working as it should, it always shows 100% of the circle */
        #loading-progress circle:last-child {
            stroke-dasharray: calc(3.141 * var(--blazor-load-percentage, 0%)), 500%;
            transition: stroke-dasharray 0.05s ease-in-out;
        }

        #loading-progress-text:after {
            content: var(--blazor-load-percentage-text, "Loading");
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="flex items-center justify-center min-h-screen bg-infini-base-90">
            <div class="flex flex-col items-center gap-4">
                <!-- Blazor-controlled progress -->
                <svg id="loading-progress" class="w-20 h-20 stroke-infini-base-90 fill-none" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45"/>
                    <circle
                        id="circle-progress"
                        class="stroke-infini-accent"
                        cx="50" cy="50" r="45"
                    />
                </svg>

                <!-- Blazor sets this text dynamically -->
                <div id="loading-progress-text" class="text-lg font-medium text-gray-300"></div>
            </div>
        </div>
    </div>
    
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/InfiniLore.InfiniBlazor/InfiniBlazor.js"></script>
</body>

</html>
